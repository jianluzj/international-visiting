services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./processed:/app/processed
      - ./downloads:/app/downloads
      - ./jobs:/app/jobs
    depends_on:
      - redis
    command: uvicorn api:app --host 0.0.0.0 --port 8080

  worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env
    volumes:
      - ./output:/app/output
      - ./processed:/app/processed
      - ./downloads:/app/downloads
      - ./jobs:/app/jobs
    depends_on:
      - redis
    command: celery -A tasks worker --loglevel=info --concurrency=1
